name: Correction
description: Report a factual error on the site. Wrong sentences get corrected or removed, publicly.
title: "Correction: "
labels: ["correction"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: The page on the live site where the error appears.
      placeholder: https://pbccfacts.com/...
    validations:
      required: true
  - type: textarea
    id: sentence
    attributes:
      label: The specific sentence
      description: Quote the exact sentence or claim that is wrong.
    validations:
      required: true
  - type: textarea
    id: whats-wrong
    attributes:
      label: What is factually wrong
      description: State the error plainly.
    validations:
      required: true
  - type: textarea
    id: correct-source
    attributes:
      label: Source for the correct fact
      description: A public URL (court record, regulator finding, journalism, or PBCC's own publication) establishing the correct fact. Optional but it speeds everything up.
    validations:
      required: false
